version: "0.1"
phases:
  clarify:
    artifact: TASK.md
    inputs: {}
    required_fields:
      - task.verdict
    verdict_field: task.verdict
    verdicts:
      READY: {next: scout}
  scout:
    artifact: RESEARCH.md
    inputs:
      required: [clarify]
    required_fields:
      - scout.verdict
      - scout.unknowns
    field_rules:
      scout.unknowns: {min_items: 1}
    verdict_field: scout.verdict
    verdicts:
      PASS: {next: establish}
  establish:
    artifact: PLAN.md
    inputs:
      required: [scout]
    required_fields:
      - plan.verdict
    verdict_field: plan.verdict
    verdicts:
      READY: {next: review}
  review:
    artifact: REVIEW.md
    inputs:
      required: [establish]
    required_fields:
      - review.verdict
      - review.findings
    verdict_field: review.verdict
    model_policy:
      family_must_differ_from: establish
    verdicts:
      PASS: {next: null}
      BLOCKING:
        next: establish
        retry:
          max_rounds: 2
          exhausted: escalation
